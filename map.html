<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>แผนที่สำรวจ – Survey Solo Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth-check.js"></script>
<script src="map-state.js"></script>
<style>
/* ═══ Base ═══ */
:root{--st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;overflow:hidden;height:100dvh;background:#0f172a}
#map{position:absolute;inset:0;z-index:0}

/* ═══ Shared button styles ═══ */
.ctrl-btn{
  display:flex;align-items:center;justify-content:center;
  background:white;border:none;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.18);transition:.15s;
  -webkit-tap-highlight-color:transparent;
}
.ctrl-btn:active{transform:scale(.92)}
.ctrl-btn.sq{width:44px;height:44px;border-radius:14px;color:#374151}
.ctrl-btn.round{width:50px;height:50px;border-radius:50%;font-size:18px;color:#374151}
.ctrl-btn.active{background:#2563eb;color:white}

/* ═══ Top bar ═══ */
#top-bar{
  position:absolute;top:calc(10px + var(--st));left:10px;right:10px;
  z-index:1500;display:flex;gap:8px;align-items:center;
  pointer-events:none;
}
#top-bar>*{pointer-events:auto}

/* Search box */
#search-wrap{
  flex:1;position:relative;
  background:white;border-radius:14px;height:44px;
  box-shadow:0 2px 12px rgba(0,0,0,.18);
  display:flex;align-items:center;padding:0 12px;gap:8px;
}
#pac-input{
  flex:1;border:none;outline:none;font-size:13px;
  font-family:'Sarabun',sans-serif;background:transparent;
  min-width:0;
}
#search-clear{background:none;border:none;color:#9ca3af;cursor:pointer;font-size:12px;padding:0}
#search-results{
  position:absolute;top:50px;left:0;right:0;background:white;
  border-radius:16px;box-shadow:0 8px 28px rgba(0,0,0,.18);
  max-height:240px;overflow-y:auto;z-index:2200;
}
.s-item{
  display:flex;align-items:center;gap:10px;padding:11px 14px;
  cursor:pointer;border-bottom:1px solid #f3f4f6;font-size:12px;
}
.s-item:last-child{border:none}.s-item:active{background:#f9fafb}

/* ═══ Tool column: zoom + drawing ═══ */
#tool-col{
  position:absolute;
  top:calc(10px + var(--st));
  right:10px;
  display:flex;flex-direction:column;gap:8px;z-index:1400;
  align-items:flex-end;
}
/* zoom row: +/- side by side, then draw bar below */
#left-bar{
  display:flex;flex-direction:row;gap:8px;
}
#drawing-bar{
  display:flex;flex-direction:row;gap:6px;
  opacity:0;pointer-events:none;transition:.2s;
  justify-content:flex-end;
}
#drawing-bar.active{opacity:1;pointer-events:auto}
.draw-btn{
  width:40px;height:40px;border-radius:12px;background:white;border:none;
  box-shadow:0 2px 8px rgba(0,0,0,.14);cursor:pointer;font-size:15px;color:#374151;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.draw-btn:active{transform:scale(.9)}
.draw-btn.active{background:#2563eb;color:white}

/* ═══ Parcel chip ═══ */
#parcel-chip{
  position:absolute;top:calc(64px + var(--st));left:50%;
  transform:translateX(-50%);
  background:rgba(15,23,42,.93);backdrop-filter:blur(8px);
  color:white;border-radius:22px;padding:7px 8px 7px 16px;
  font-size:13px;font-weight:700;
  display:none;align-items:center;gap:6px;
  z-index:3000;max-width:88vw;
  box-shadow:0 4px 20px rgba(0,0,0,.35);
  pointer-events:auto;
}
#chip-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-btn{
  background:rgba(255,255,255,.13);border:none;border-radius:12px;
  color:white;font-size:11px;padding:4px 10px;cursor:pointer;flex-shrink:0;
  white-space:nowrap;transition:.15s;
}
.chip-btn:active{background:rgba(255,255,255,.25)}
.chip-close{
  background:rgba(255,255,255,.1);border:none;border-radius:50%;
  color:rgba(255,255,255,.7);width:24px;height:24px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:11px;transition:.15s;
}

/* ═══ Survey float button (above bottom-bar) ═══ */
#survey-float{
  position:absolute;bottom:calc(80px + var(--sb));left:50%;
  transform:translateX(-50%);
  z-index:2000;display:flex;align-items:center;gap:8px;
  pointer-events:none;
}
#survey-float>*{pointer-events:auto}
.action-btn{
  height:50px;padding:0 22px;border-radius:25px;
  font-weight:700;font-size:14px;border:none;cursor:pointer;
  display:flex;align-items:center;gap:9px;white-space:nowrap;
  transition:.2s;
}
.action-btn:active{transform:scale(.94)}
.action-btn.orange{background:#ea580c;color:white;box-shadow:0 8px 24px rgba(234,88,12,.4)}
.action-btn.green{background:#10b981;color:white;box-shadow:0 8px 24px rgba(16,185,129,.4)}
.action-btn.red{background:#ef4444;color:white;box-shadow:0 8px 24px rgba(239,68,68,.35)}
#survey-floating-actions{display:none;align-items:center;gap:8px}

/* ═══ Bottom bar strip ═══ */
#bottom-bar{
  position:absolute;bottom:0;left:0;right:0;
  height:calc(68px + var(--sb));padding-bottom:var(--sb);
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
  border-top:1px solid rgba(0,0,0,.07);
  display:flex;align-items:center;padding-left:10px;padding-right:10px;
  gap:6px;z-index:1200;
}
/* Layer icon button */
#bb-layer{
  width:50px;height:50px;border-radius:14px;overflow:hidden;
  cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);flex-shrink:0;
  position:relative;
}
#bb-layer img{width:100%;height:100%;object-fit:cover;opacity:.9}
#bb-layer span{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.55);color:white;font-size:8px;
  text-align:center;padding:2px 0;font-weight:700;
}
/* Map type pills */
#bb-mtype{
  display:flex;gap:3px;flex:1;overflow-x:auto;scrollbar-width:none;
  background:#f1f5f9;border-radius:12px;padding:4px;
}
#bb-mtype::-webkit-scrollbar{display:none}
.mtype-btn{
  border:none;cursor:pointer;border-radius:9px;padding:6px 10px;
  font-size:10px;font-weight:700;color:#64748b;background:transparent;
  transition:.15s;font-family:'Sarabun',sans-serif;white-space:nowrap;flex-shrink:0;
}
.mtype-btn.active{background:white;color:#2563eb;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.mtype-btn:active{opacity:.7}
/* Nav nearest */
#btn-nav-nearest{
  display:flex;align-items:center;gap:5px;
  background:#eff6ff;border:none;border-radius:12px;
  padding:8px 12px;font-size:11px;font-weight:700;color:#2563eb;
  cursor:pointer;flex-shrink:0;transition:.15s;
}
#btn-nav-nearest:disabled{color:#9ca3af;background:#f8fafc;cursor:default}
#btn-nav-nearest:not(:disabled):active{transform:scale(.93)}
/* GPS button */
#btn-gps-native{
  width:44px;height:44px;border-radius:13px;background:#eff6ff;
  border:none;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:#2563eb;transition:.15s;
}
#btn-gps-native.active{background:#2563eb;color:white}
#btn-gps-native:active{transform:scale(.92)}

/* ═══ Sheets (bottom drawer) ═══ */
.sheet{
  position:absolute;bottom:0;left:0;right:0;background:white;
  border-radius:24px 24px 0 0;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.25,.8,.25,1);
  padding-bottom:var(--sb);box-shadow:0 -8px 40px rgba(0,0,0,.2);
}
.sheet.active{transform:translateY(0)}
#sheet{z-index:4000;max-height:88vh}
#layer-sheet{z-index:3500;max-height:65vh}

.sheet-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;border-bottom:1px solid #f3f4f6;
}
.sheet-header h2{font-size:14px;font-weight:700;color:#1e293b;margin:0}
.close-btn{
  width:32px;height:32px;border-radius:50%;background:#f1f5f9;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#64748b;font-size:12px;transition:.15s;
}
.close-btn:active{background:#e2e8f0}

.sheet-body{overflow-y:auto;padding:18px 20px}
.sheet-body::-webkit-scrollbar{width:3px}
.sheet-body::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:10px}

/* Fields */
.field-label{
  font-size:10px;font-weight:700;color:#94a3b8;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block;
}
.input-field{
  width:100%;border:1.5px solid #e2e8f0;border-radius:12px;
  padding:11px 14px;font-size:13px;font-family:'Sarabun',sans-serif;
  outline:none;transition:.15s;resize:none;
}
.input-field:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* Parcel detail cards */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.detail-card{
  background:#f8fafc;border-radius:14px;padding:12px 14px;
  border:1px solid #e2e8f0;
}
.detail-card .dc-label{font-size:10px;color:#94a3b8;font-weight:600;text-transform:uppercase}
.detail-card .dc-value{font-size:14px;font-weight:700;color:#1e293b;margin-top:3px;word-break:break-all}

/* Raw data list */
.raw-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:12px;
}
.raw-row:last-child{border:none}
.raw-key{color:#94a3b8;flex-shrink:0;margin-right:8px}
.raw-val{color:#334155;font-weight:600;text-align:right;word-break:break-word;max-width:60%}

/* Camera button */
.photo-trigger{
  width:100%;padding:16px;border:2px dashed #e2e8f0;border-radius:14px;
  background:#fafafa;cursor:pointer;color:#64748b;font-size:13px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:.15s;font-family:'Sarabun',sans-serif;
}
.photo-trigger:active{border-color:#2563eb;background:#eff6ff}

/* Map labels */
.map-label{text-shadow:0 0 4px rgba(0,0,0,.9),1px 1px 3px rgba(0,0,0,1);pointer-events:none}

/* Street view */
body.streetview-active .hide-sv{display:none!important}
</style>
</head>
<body>

<!-- ═══ Map canvas ═══ -->
<div id="map"></div>

<!-- ═══ Top bar (แค่ ← กับ ช่องค้นหา) ═══ -->
<div id="top-bar" class="hide-sv">
  <button class="ctrl-btn sq" onclick="history.back()" title="กลับ">
    <i class="fa-solid fa-arrow-left" style="color:#2563eb"></i>
  </button>
  <div id="search-wrap">
    <i class="fa-solid fa-magnifying-glass" style="color:#9ca3af;font-size:13px"></i>
    <input id="pac-input" type="text" placeholder="ค้นหาแปลง หรือสถานที่..."
      oninput="handleSearch(this.value)" autocomplete="off">
    <button id="search-clear"
      onclick="document.getElementById('pac-input').value='';document.getElementById('search-results').classList.add('hidden')">
      <i class="fa-solid fa-times"></i>
    </button>
    <div id="search-results" class="hidden"></div>
  </div>
</div>

<!-- ═══ Tool column (top-right): refresh / draw-toggle + drawing tools ═══ -->
<div id="tool-col" class="hide-sv">
  <div id="left-bar">
    <button class="ctrl-btn sq" onclick="refreshData()" title="รีเฟรช">
      <i class="fa-solid fa-arrows-rotate" style="color:#16a34a"></i>
    </button>
    <button class="ctrl-btn sq" id="btn-draw" onclick="toggleDrawingBar()" title="วาด">
      <i class="fa-solid fa-pen-ruler" style="color:#7c3aed"></i>
    </button>
  </div>
  <div id="drawing-bar">
    <button id="draw-marker" class="draw-btn" onclick="setDrawingMode('marker')" title="ปักหมุด">
      <i class="fa-solid fa-map-pin"></i>
    </button>
    <button id="draw-polygon" class="draw-btn" onclick="setDrawingMode('polygon')" title="วาดพื้นที่">
      <i class="fa-solid fa-draw-polygon"></i>
    </button>
    <button id="draw-polyline" class="draw-btn" onclick="setDrawingMode('polyline')" title="วาดเส้น">
      <i class="fa-solid fa-pen-nib"></i>
    </button>
    <button id="draw-clear" class="draw-btn" onclick="clearDrawings()" title="ล้าง" style="color:#ef4444">
      <i class="fa-solid fa-trash-can"></i>
    </button>
  </div>
</div>

<!-- ═══ Parcel chip ═══ -->
<div id="parcel-chip" class="hide-sv">
  <span id="chip-label"></span>
  <button class="chip-btn" onclick="openSheetForSelected()">
    <i class="fa-solid fa-ellipsis"></i> รายละเอียด
  </button>
  <button class="chip-close" onclick="deselectParcel()" title="ยกเลิก">
    <i class="fa-solid fa-times"></i>
  </button>
</div>

<!-- ═══ Survey float (above bottom-bar) ═══ -->
<div id="survey-float" class="hide-sv">
  <button id="btn-nav-clear" class="action-btn red hidden" onclick="clearNavigation()">
    <i class="fa-solid fa-xmark"></i><span>ยกเลิกนำทาง</span>
  </button>
  <div id="survey-floating-actions">
    <button id="btn-start-survey" class="action-btn orange" onclick="handleSurveyToggle()">
      <i class="fa-solid fa-clipboard-check"></i><span>เริ่มสำรวจ</span>
    </button>
  </div>
</div>

<!-- ═══ Bottom bar strip ═══ -->
<div id="bottom-bar" class="hide-sv">
  <!-- Layer -->
  <div id="bb-layer" onclick="toggleLayerSheet(true)" title="เลเยอร์">
    <img src="https://mt1.google.com/vt/lyrs=m&x=3191&y=1900&z=12" alt="map">
    <span>เลเยอร์</span>
  </div>
  <!-- Map type -->
  <div id="bb-mtype">
    <button class="mtype-btn active" id="mt-hybrid"    onclick="setMapType('hybrid')"   >🛰 Hybrid</button>
    <button class="mtype-btn"        id="mt-roadmap"   onclick="setMapType('roadmap')"  >🗺 Road</button>
    <button class="mtype-btn"        id="mt-satellite" onclick="setMapType('satellite')">📡 Sat</button>
    <button class="mtype-btn"        id="mt-terrain"   onclick="setMapType('terrain')"  >⛰ Terrain</button>
  </div>
  <!-- Nav nearest -->
  <button id="btn-nav-nearest" onclick="navigateToNearest()" disabled>
    <i class="fa-solid fa-route"></i><span>ใกล้สุด</span>
  </button>
  <!-- GPS -->
  <button id="btn-gps-native" onclick="toggleGPSFollow()" title="GPS">
    <i class="fa-solid fa-location-crosshairs"></i>
  </button>
</div>

<!-- ═══ Layer sheet ═══ -->
<div id="layer-sheet" class="sheet">
  <div class="sheet-header">
    <h2><i class="fa-solid fa-layer-group mr-2 text-blue-500"></i>เลเยอร์แผนที่</h2>
    <button class="close-btn" onclick="toggleLayerSheet(false)">
      <i class="fa-solid fa-times"></i>
    </button>
  </div>
  <!-- Filter box -->
  <div style="padding:10px 16px 0;display:flex;gap:8px;align-items:center;">
    <div style="flex:1;display:flex;align-items:center;gap:8px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:8px 12px;">
      <i class="fa-solid fa-filter" style="color:#94a3b8;font-size:12px"></i>
      <input id="layer-filter-input" type="text" placeholder="กรองแปลงในเลเยอร์..."
        style="flex:1;border:none;outline:none;font-size:13px;background:transparent;font-family:'Sarabun',sans-serif;"
        oninput="applyLayerFilter(this.value)">
      <button onclick="document.getElementById('layer-filter-input').value='';applyLayerFilter('')"
        style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:11px;padding:0">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>
  </div>
  <div class="sheet-body" id="layer-list-bottom"
    style="display:flex;flex-direction:column;gap:8px;max-height:45vh"></div>
</div>

<!-- ═══ Survey detail sheet ═══ -->
<div id="sheet" class="sheet">
  <div class="sheet-header">
    <h2 id="sheet-title">ข้อมูลแปลงที่ดิน</h2>
    <button class="close-btn" onclick="closeSheet()">
      <i class="fa-solid fa-times"></i>
    </button>
  </div>
  <div class="sheet-body">

    <!-- Parcel summary cards -->
    <div id="parcel-details"></div>

    <!-- Raw data toggle -->
    <details class="mb-4">
      <summary class="text-[10px] font-bold text-slate-400 uppercase tracking-wider cursor-pointer select-none mb-2">
        ข้อมูลดิบทั้งหมด
      </summary>
      <div id="parcel-raw" class="mt-2"></div>
    </details>

    <!-- Survey form -->
    <div id="survey-form-container" class="hidden space-y-4">
      <!-- Key / primary user -->
      <div>
        <label class="field-label">รหัส / ชื่อ (คีย์)</label>
        <input id="sheet-primary-user" type="text" class="input-field" placeholder="ดึงจากเลเยอร์อัตโนมัติ">
      </div>

      <!-- Notes -->
      <div>
        <label class="field-label">บันทึกการสำรวจ</label>
        <textarea id="sheet-note" rows="3" class="input-field"
          placeholder="รายละเอียด / หมายเหตุ..."></textarea>
      </div>

      <!-- Photo -->
      <div>
        <label class="field-label">ภาพถ่าย</label>
        <input type="file" id="inp-photo" accept="image/*"
          capture="environment" class="hidden" onchange="previewPhoto(this)">
        <button class="photo-trigger" onclick="document.getElementById('inp-photo').click()">
          <i class="fa-solid fa-camera" style="font-size:22px;color:#94a3b8"></i>
          <span>กดเพื่อถ่ายภาพ หรือเลือกรูป</span>
        </button>
        <img id="img-preview" style="display:none;width:100%;border-radius:14px;margin-top:10px;max-height:200px;object-fit:cover">
      </div>
    </div>

    <!-- Footer badge -->
    <p id="project-name"
      style="text-align:center;font-size:9px;font-weight:700;color:#cbd5e1;
             text-transform:uppercase;letter-spacing:.08em;margin-top:18px;padding-top:12px;
             border-top:1px solid #f1f5f9"></p>
  </div>
</div>

<!-- ═══ Module scripts ═══ -->
<script src="map-ui.js"></script>
<script src="map-layers.js"></script>
<script src="map-survey.js"></script>
<script src="map-drawing.js"></script>

<script>
/* ─── Bootstrap ─── */
window.onload = async () => {
    user = AUTH.check();
    if (!user) return;
    const info = JSON.parse(localStorage.getItem('survey_current_project_info') || '{}');
    if (!info.id) return (window.location.href = 'projects.html');
    currentProject = info;
    document.getElementById('project-name').innerText = currentProject.projectName || '';

    showLoading(true, 'กำลังเตรียมแผนที่...');
    try {
        const cfg = await AUTH.call('getConfig');
        if (cfg.status !== 'success') throw new Error('getConfig failed');

        // Load map library config
        try {
            const libRes = await AUTH.call('getMapLibrary', { project_id: currentProject.id });
            if (libRes.status === 'success') mapLibrary = libRes.library || [];
        } catch(e) { console.warn('mapLibrary not loaded', e); }

        // Inject Google Maps API
        const s = document.createElement('script');
        s.src = `https://maps.googleapis.com/maps/api/js?key=${cfg.config.GOOGLE_MAPS_KEY}&libraries=drawing,geometry,places`;
        s.onload  = () => _initMap();
        s.onerror = () => { showLoading(false); Swal.fire('Error','โหลด Google Maps ไม่ได้','error'); };
        document.head.appendChild(s);
    } catch(err) {
        showLoading(false);
        Swal.fire('Error', 'ไม่สามารถเริ่มแผนที่ได้: ' + err.message, 'error');
    }
};

async function _initMap() {
    // Map instance
    map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 13.7, lng: 100.5 }, zoom: 16,
        mapTypeId: 'hybrid',
        disableDefaultUI: true,
        streetViewControl: true,
        streetViewControlOptions: { position: google.maps.ControlPosition.LEFT_TOP },
        gestureHandling: 'greedy'
    });
    infoWindow = new google.maps.InfoWindow();

    // Directions
    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
        map, suppressMarkers: false,
        polylineOptions: { strokeColor: '#2563eb', strokeWeight: 5, strokeOpacity: .8 }
    });

    // Places
    autocompleteService = new google.maps.places.AutocompleteService();
    placesService = new google.maps.places.PlacesService(map);

    // Street view UX
    map.getStreetView().addListener('visible_changed', function () {
        document.body.classList.toggle('streetview-active', this.getVisible());
    });

    map.addListener('zoom_changed', updateMapStyles);
    map.addListener('dragend', updateMapStyles);

    setupDrawingManager();
    setupGPS();

    // ── Load layers ──
    showLoading(true, 'กำลังโหลดเลเยอร์...');

    // 1) From mapLibrary (Settings > เพิ่มแผนที่)
    for (const lib of (Array.isArray(mapLibrary) ? mapLibrary : [])) {
        if (lib.url) await loadSingleLayer(lib.url, lib.name);
    }

    // 2) From project.mapUrl
    if (currentProject.mapUrl) {
        const url = currentProject.mapUrl;
        const isFolder = url.includes('/folders/') || (url.includes('drive') && url.includes('id='));
        if (isFolder) {
            try {
                const lr = await AUTH.call('get_map_list', { folder_url: url });
                const files = (lr.status === 'success' && lr.list && lr.list.length) ? lr.list : null;
                if (files) {
                    for (const f of files) {
                        const already = Object.values(mapLayers).some(l => l.url === (f.id || f.url));
                        if (!already) await loadSingleLayer(f.id || f.url, f.name);
                    }
                } else {
                    await loadSingleLayer(url, currentProject.projectName);
                }
            } catch(e) { await loadSingleLayer(url, currentProject.projectName); }
        } else {
            const already = Object.values(mapLayers).some(l => l.url === url);
            if (!already) await loadSingleLayer(url, currentProject.projectName);
        }
    }

    await refreshData();
    restoreDrawnItems();
    showLoading(false);
}
function setMapType(type) {
    if (!map) return;
    map.setMapTypeId(type);
    document.querySelectorAll('.mtype-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('mt-' + type);
    if (btn) btn.classList.add('active');
}
</script>
