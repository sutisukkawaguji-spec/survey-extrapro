<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>แผนที่สำรวจ - Survey Solo Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script>
    <script src="auth-check.js"></script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { font-family: 'Sarabun', sans-serif; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; background: #f3f4f6; }
        #map { flex: 1; width: 100%; z-index: 0; }
        .top-bar { position: absolute; top: calc(10px + var(--safe-top)); left: 10px; right: 10px; z-index: 1000; pointer-events: none; }
        .top-row { display: flex; gap: 8px; pointer-events: auto; margin-bottom: 8px; }
        .control-btn { background: white; width: 45px; height: 45px; border-radius: 12px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); cursor: pointer; color: #444; border: none; flex-shrink: 0; }
        .fab-col { position: absolute; bottom: calc(30px + var(--safe-bottom)); right: 10px; display: flex; flex-direction: column; gap: 12px; z-index: 900; }
        .btn-fab { width: 55px; height: 55px; border-radius: 50%; background: white; color: #333; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25); display: flex; justify-content: center; align-items: center; font-size: 22px; border: none; cursor: pointer; }
        #sheet { position: absolute; bottom: 0; left: 0; right: 0; background: white; border-radius: 24px 24px 0 0; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 2000; max-height: 85vh; padding-bottom: var(--safe-bottom); box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.2); }
        #sheet.active { transform: translateY(0); }
        .sheet-content { padding: 20px; overflow-y: auto; }
        .input-premium { width: 100%; border: 1px solid #ddd; border-radius: 12px; padding: 12px; font-size: 14px; outline: none; }
        .input-premium:focus { border-color: #2563eb; }
        .photo-preview { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-bar">
        <div class="top-row justify-between">
            <button class="control-btn" onclick="window.location.href='projects.html'">
                <i class="fa-solid fa-arrow-left text-blue-600"></i>
            </button>
            <div class="flex gap-2">
                <button class="control-btn text-orange-600" onclick="navigateToNearest()" title="นำทางไปแปลงที่ใกล้ที่สุด">
                    <i class="fa-solid fa-person-walking-arrow-right"></i>
                </button>
                <button class="control-btn text-blue-600" onclick="refreshData()" title="รีเฟรชข้อมูล">
                    <i class="fa-solid fa-sync"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="fab-col">
        <button class="btn-fab bg-blue-600 text-white" onclick="toggleGPSFollow()" id="btn-gps">
            <i class="fa-solid fa-location-arrow"></i>
        </button>
    </div>

    <div id="sheet">
        <div class="p-4 border-b flex justify-between items-center">
            <h2 id="sheet-title" class="font-bold text-gray-800">ข้อมูลแปลงที่ดิน</h2>
            <button onclick="closeSheet()" class="w-8 h-8 rounded-full bg-gray-100"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="sheet-content space-y-4">
            <div id="parcel-details" class="bg-blue-50 p-3 rounded-xl text-xs text-blue-800 space-y-1"></div>
            
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase">ถ่ายภาพการสำรวจ</label>
                <input type="file" id="inp-photo" accept="image/*" capture="environment" class="hidden" onchange="previewPhoto(this)">
                <button onclick="document.getElementById('inp-photo').click()" class="w-full py-4 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 text-sm flex flex-col items-center gap-1">
                    <i class="fa-solid fa-camera text-2xl"></i>
                    <span>กดเพื่อถ่ายภาพหรือเลือกรูป</span>
                </button>
                <img id="img-preview" class="photo-preview">
            </div>

            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">หมายเหตุการสำรวจ</label>
                <textarea id="sheet-note" rows="3" class="input-premium" placeholder="กรอกรายละเอียดการสำรวจ..."></textarea>
            </div>

            <button id="btn-save-survey" onclick="handleSaveSurvey()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-100">
                บันทึกการสำรวจ
            </button>
        </div>
    </div>

    <script>
        let map, userMarker, infoWindow;
        let user = null, currentProject = null;
        let surveyRecords = new Map();
        let selectedFeatureId = null, selectedLocation = null;
        let isFollowing = false, recordMarkers = [];

        window.onload = async () => {
            user = AUTH.check();
            if (!user) return;
            const projectInfo = JSON.parse(localStorage.getItem('survey_current_project_info') || '{}');
            if (!projectInfo.id) return window.location.href = 'projects.html';
            currentProject = projectInfo;

            showLoading(true, 'กำลังเตรียมข้อมูลแผนที่...');
            await initMap();
            await refreshData();
            showLoading(false);
        };

        async function initMap() {
            try {
                const res = await AUTH.callGAS('getConfig');
                if (res.status === 'success') {
                    const script = document.createElement('script');
                    script.src = `https://maps.googleapis.com/maps/api/js?key=${res.config.GOOGLE_MAPS_KEY}&libraries=geometry`;
                    script.onload = () => setupMap();
                    document.head.appendChild(script);
                }
            } catch (err) { Swal.fire('Error', 'ไม่สามารถโหลด Google Maps ได้', 'error'); }
        }

        function setupMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 13.7, lng: 100.5 },
                zoom: 16,
                mapTypeId: 'hybrid',
                mapTypeControl: false, streetViewControl: false, fullscreenControl: false
            });

            // 1. โหลดแผนที่กลาง (Global Background) ถ้ามี
            const globalMapUrl = localStorage.getItem('survey_global_map_url');
            if (globalMapUrl) {
                let directGlobalUrl = formatGoogleDriveUrl(globalMapUrl);
                const globalLayer = new google.maps.Data();
                globalLayer.loadGeoJson(directGlobalUrl);
                globalLayer.setStyle({
                    fillColor: '#6b7280',
                    fillOpacity: 0.1,
                    strokeColor: '#9ca3af',
                    strokeWeight: 0.5,
                    clickable: false // แผนที่กลางห้ามคลิก
                });
                globalLayer.setMap(map);
            }

            // 2. โหลดแผนที่โครงการ (Main Layer)
            if (currentProject.mapUrl) {
                let directUrl = formatGoogleDriveUrl(currentProject.mapUrl);
                map.data.loadGeoJson(directUrl, null, (features) => {
                    const bounds = new google.maps.LatLngBounds();
                    features.forEach(f => f.getGeometry().forEachLatLng(p => bounds.extend(p)));
                    map.fitBounds(bounds);
                    applyDynamicStyle();
                });
            }

            map.data.addListener('click', (event) => {
                const f = event.feature;
                const id = f.getProperty('id') || f.getProperty('ID') || f.getId();
                if (!id) return Swal.fire('คำเตือน', 'GeoJSON นี้ไม่มี ID แปลงที่ดิน', 'warning');
                selectedFeatureId = id;
                selectedLocation = event.latLng;
                openSurveySheet(f);
            });
...
        }

        function formatGoogleDriveUrl(url) {
            if (url.includes('drive.google.com')) {
                const match = url.match(/\/d\/(.+?)\//) || url.match(/id=(.+?)(&|$)/);
                return match ? `https://docs.google.com/uc?export=download&id=${match[1]}` : url;
            }
            return url;
        }

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(p => {
                    const pos = { lat: p.coords.latitude, lng: p.coords.longitude };
                    if (!userMarker) {
                        userMarker = new google.maps.Marker({ position: pos, map: map, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: '#2563eb', fillOpacity: 1, strokeColor: 'white', strokeWeight: 2 } });
                    } else userMarker.setPosition(pos);
                    if (isFollowing) map.setCenter(pos);
                }, null, { enableHighAccuracy: true });
            }
        }

        async function refreshData() {
            try {
                const res = await AUTH.callGAS('getSurveyRecords', { project_id: currentProject.id });
                if (res.status === 'success') {
                    surveyRecords.clear();
                    res.records.forEach(r => surveyRecords.set(r.feature_id.toString(), r));
                    applyDynamicStyle();
                    renderSurveyMarkers();
                }
            } catch (err) { console.error(err); }
        }

        function applyDynamicStyle() {
            map.data.setStyle((f) => {
                const id = f.getProperty('id') || f.getProperty('ID') || f.getId();
                const record = surveyRecords.get(id ? id.toString() : null);
                return { fillColor: record && record.status === 'done' ? '#22c55e' : '#ef4444', fillOpacity: 0.4, strokeColor: 'white', strokeWeight: 1 };
            });
        }

        function renderSurveyMarkers() {
            recordMarkers.forEach(m => m.setMap(null));
            recordMarkers = [];
            surveyRecords.forEach((r, id) => {
                if (r.lat && r.lng) {
                    const m = new google.maps.Marker({ position: { lat: r.lat, lng: r.lng }, map: map, icon: { url: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png' } });
                    m.addListener('click', () => {
                        Swal.fire({ title: 'บันทึกการสำรวจ', html: `<div class="text-left text-sm"><b>ผู้สำรวจ:</b> ${r.surveyor}<br><b>บันทึก:</b> ${r.note}<br>${r.photo_url ? `<img src="${r.photo_url}" class="mt-2 rounded-lg w-full">` : ''}</div>` });
                    });
                    recordMarkers.push(m);
                }
            });
        }

        function openSurveySheet(f) {
            const props = [];
            f.forEachProperty((v, k) => { if (typeof v !== 'object') props.push(`<div><b>${k}:</b> ${v}</div>`); });
            document.getElementById('parcel-details').innerHTML = props.join('');
            document.getElementById('sheet-title').innerText = "สำรวจแปลง ID: " + selectedFeatureId;
            const r = surveyRecords.get(selectedFeatureId.toString());
            document.getElementById('sheet-note').value = r ? r.note : '';
            document.getElementById('img-preview').style.display = 'none';
            if (r && r.photo_url) { document.getElementById('img-preview').src = r.photo_url; document.getElementById('img-preview').style.display = 'block'; }
            document.getElementById('sheet').classList.add('active');
        }

        function closeSheet() { document.getElementById('sheet').classList.remove('active'); }
        function previewPhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { const img = document.getElementById('img-preview'); img.src = e.target.result; img.style.display = 'block'; };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function handleSaveSurvey() {
            const note = document.getElementById('sheet-note').value;
            const photoFile = document.getElementById('inp-photo').files[0];
            showLoading(true, 'กำลังบันทึกข้อมูล...');
            try {
                let photoUrl = "";
                const existing = surveyRecords.get(selectedFeatureId.toString());
                if (existing) photoUrl = existing.photo_url;
                if (photoFile) photoUrl = await AUTH.uploadImage(photoFile);
                const res = await AUTH.callGAS('saveSurveyRecord', { project_id: currentProject.id, feature_id: selectedFeatureId, username: user.username, lat: selectedLocation.lat(), lng: selectedLocation.lng(), photo_url: photoUrl, note: note });
                if (res.status === 'success') {
                    // เล่นเสียงถ้าเปิดไว้
                    if (localStorage.getItem('survey_sfx_enabled') !== 'false') {
                        new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play();
                    }
                    await refreshData(); 
                    closeSheet(); 
                    Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'บันทึกสำเร็จ', timer: 2000, showConfirmButton: false }); 
                }
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
            finally { showLoading(false); }
        }

        function navigateToNearest() {
            if (!userMarker) return Swal.fire('Error', 'ไม่พบตำแหน่ง GPS', 'error');
            const userPos = userMarker.getPosition();
            let nearest = null, minD = Infinity;
            map.data.forEach(f => {
                const id = f.getProperty('id') || f.getProperty('ID') || f.getId();
                if (!surveyRecords.has(id ? id.toString() : null)) {
                    const b = new google.maps.LatLngBounds();
                    f.getGeometry().forEachLatLng(p => b.extend(p));
                    const center = b.getCenter();
                    const d = google.maps.geometry.spherical.computeDistanceBetween(userPos, center);
                    if (d < minD) { minD = d; nearest = center; }
                }
            });
            if (nearest) {
                Swal.fire({ title: 'นำทาง', text: `แปลงที่ใกล้ที่สุด ${Math.round(minD)} ม.`, icon: 'question', showCancelButton: true }).then(r => {
                    if (r.isConfirmed) window.open(`https://www.google.com/maps/dir/?api=1&destination=${nearest.lat()},${nearest.lng()}`, '_blank');
                });
            } else Swal.fire('สำเร็จ', 'สำรวจครบแล้ว', 'success');
        }

        function toggleGPSFollow() { isFollowing = !isFollowing; document.getElementById('btn-gps').classList.toggle('bg-blue-600', isFollowing); document.getElementById('btn-gps').classList.toggle('text-white', isFollowing); }
    </script>
</body>
</html>
