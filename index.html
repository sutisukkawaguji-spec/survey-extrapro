<html lang="th">
<head>
    <meta charset="UTF-8">

    <title>เข้าสู่ระบบ - Survey Solo Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth-check.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 24px; padding: 30px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; }
        .input-premium { width: 100%; background: #f3f4f6; border: 2px solid transparent; border-radius: 12px; padding: 12px 15px 12px 45px; font-size: 14px; transition: 0.3s; outline: none; }
        .input-premium:focus { background: white; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .btn-premium { width: 100%; background: #2563eb; color: white; padding: 14px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
        .btn-premium:active { transform: scale(0.98); }
        .label-req::after { content: " *"; color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="login-section" class="glass-card flex flex-col gap-5 text-center">
        <div class="flex justify-center mb-2">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-4xl shadow-xl shadow-blue-200">
                <i class="fa-solid fa-map-location-dot"></i>
            </div>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Survey Solo Pro</h1>
        <p class="text-gray-500 text-sm">เข้าสู่ระบบเพื่อเริ่มงานสำรวจ</p>
        <div class="space-y-3 text-left">
            <label class="text-xs font-bold text-gray-500 ml-1 label-req">ชื่อผู้ใช้งาน</label>
            <div class="relative">
                <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="login-user" placeholder="กรอกชื่อผู้ใช้งาน" class="input-premium">
            </div>
            <label class="text-xs font-bold text-gray-500 ml-1 label-req">รหัสผ่าน</label>
            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="password" id="login-pass" placeholder="กรอกรหัสผ่าน" class="input-premium">
            </div>
        </div>
        <button onclick="handleLogin()" class="btn-premium mt-2">เข้าสู่ระบบ</button>
        <button onclick="toggleAuth(false)" class="text-blue-600 text-sm font-semibold hover:underline">ยังไม่มีบัญชี? สมัครสมาชิก</button>
    </div>

                    <option value="ขอนแก่น">ขอนแก่น</option>
                    <option value="จันทบุรี">จันทบุรี</option>
                    <option value="ฉะเชิงเทรา">ฉะเชิงเทรา</option>
                    <option value="ชลบุรี">ชลบุรี</option>
                    <option value="ชัยนาท">ชัยนาท</option>
                    <option value="ชัยภูมิ">ชัยภูมิ</option>
                    <option value="ชุมพร">ชุมพร</option>
                    <option value="เชียงราย">เชียงราย</option>
                    <option value="เชียงใหม่">เชียงใหม่</option>
                    <option value="ตรัง">ตรัง</option>
                    <option value="ตราด">ตราด</option>
                    <option value="ตาก">ตาก</option>
                    <option value="นครนายก">นครนายก</option>
                    <option value="นครปฐม">นครปฐม</option>
                    <option value="นครพนม">นครพนม</option>
                    <option value="นครราชสีมา">นครราชสีมา</option>
                    <option value="นครศรีธรรมราช">นครศรีธรรมราช</option>

                    <option value="นราธิวาส">นราธิวาส</option>
                    <option value="น่าน">น่าน</option>
                    <option value="บึงกาฬ">บึงกาฬ</option>
                    <option value="บุรีรัมย์">บุรีรัมย์</option>
                    <option value="ปทุมธานี">ปทุมธานี</option>
                    <option value="ประจวบคีรีขันธ์">ประจวบคีรีขันธ์</option>
                    <option value="ปราจีนบุรี">ปราจีนบุรี</option>

                    <option value="สงขลา">สงขลา</option>

                    <option value="สมุทรปราการ">สมุทรปราการ</option>

                    <option value="สุรินทร์">สุรินทร์</option>

                    <option value="หนองบัวลำภู">หนองบัวลำภู</option>
                    <option value="อ่างทอง">อ่างทอง</option>

                </select>
            </div>

            <label class="text-xs font-bold text-gray-500 ml-1 label-req">ชื่อผู้ใช้งาน</label>
            <div class="relative">
                <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="reg-user" placeholder="กรอกชื่อผู้ใช้งาน" class="input-premium">
            </div>

            <label class="text-xs font-bold text-gray-500 ml-1 label-req">รหัสผ่าน</label>
            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="password" id="reg-pass" placeholder="กรอกรหัสผ่าน" class="input-premium">
            </div>
        </div>
        <button onclick="handleSignup()" class="btn-premium bg-green-600 hover:bg-green-700 mt-2">สมัครสมาชิก</button>
        <button onclick="toggleAuth(true)" class="text-gray-500 text-sm font-semibold hover:underline">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</button>
    </div>

    <script>
        function toggleAuth(isLogin) {
            document.getElementById('login-section').classList.toggle('hidden', !isLogin);
            document.getElementById('signup-section').classList.toggle('hidden', isLogin);
        }

        async function handleLogin() {
            const username = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            if (!username || !pass) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกข้อมูลที่มีเครื่องหมายดอกจันให้ครบถ้วน', 'warning');

            showLoading(true, 'กำลังตรวจสอบข้อมูล...');
            try {
                const res = await AUTH.call('login', { username, password: pass });
                showLoading(false);
                if (res.status === 'success') {
                    const userProfile = { ...res.user, isLoggedIn: true };
                    localStorage.setItem('survey_profile_v16', JSON.stringify(userProfile));
                    window.location.href = 'projects.html';
                } else {
                    Swal.fire('เข้าสู่ระบบไม่สำเร็จ', res.message, 'error');
                }
            } catch (err) {
                showLoading(false);
                Swal.fire('เกิดข้อผิดพลาด', err.message || 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            }
        }

        async function handleSignup() {
            const name = document.getElementById('reg-name').value.trim();
            const province = document.getElementById('reg-province').value;
            const username = document.getElementById('reg-user').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();

            if (!name || !province || !username || !pass) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกข้อมูลที่มีเครื่องหมายดอกจันให้ครบถ้วน', 'warning');
            
            if (pass.length < 4) return Swal.fire('รหัสผ่านสั้นเกินไป', 'รหัสผ่านควรมีอย่างน้อย 4 ตัวอักษร', 'warning');

            showLoading(true, 'กำลังบันทึกข้อมูล...');
            try {
                const res = await AUTH.call('register', { name, province, username, password: pass });
                showLoading(false);
                if (res.status === 'success') {
                    Swal.fire('สำเร็จ', 'ลงทะเบียนเรียบร้อยแล้ว กรุณาเข้าสู่ระบบ', 'success').then(() => toggleAuth(true));
                } else {
                    Swal.fire('ลงทะเบียนไม่สำเร็จ', res.message, 'error');
                }
            } catch (err) {
                showLoading(false);
                Swal.fire('เกิดข้อผิดพลาด', err.message || 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            }
        }

        window.onload = () => {
            const user = localStorage.getItem('survey_profile_v16');
            if (user) {
                const parsed = JSON.parse(user);
                if (parsed.isLoggedIn) window.location.href = 'projects.html';
            }
        };
    </script>
</body>
</html>
