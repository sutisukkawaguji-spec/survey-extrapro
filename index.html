<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เข้าสู่ระบบ - Survey Solo Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="config.js"></script>
    <script src="auth-check.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 24px; padding: 30px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; }
        .input-premium { width: 100%; background: #f3f4f6; border: 2px solid transparent; border-radius: 12px; padding: 12px 15px 12px 45px; font-size: 14px; transition: 0.3s; outline: none; }
        .input-premium:focus { background: white; border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .btn-premium { width: 100%; background: #2563eb; color: white; padding: 14px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
        .btn-premium:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="login-section" class="glass-card flex flex-col gap-5 text-center">
        <div class="flex justify-center mb-2">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center text-white text-4xl shadow-xl shadow-blue-200">
                <i class="fa-solid fa-map-location-dot"></i>
            </div>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Survey Solo Pro</h1>
        <p class="text-gray-500 text-sm">เข้าสู่ระบบเพื่อเริ่มงานสำรวจ</p>
        <div class="space-y-3">
            <div class="relative">
                <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="login-user" placeholder="ชื่อผู้ใช้งาน" class="input-premium">
            </div>
            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="password" id="login-pass" placeholder="รหัสผ่าน" class="input-premium">
            </div>
        </div>
        <button onclick="handleLogin()" class="btn-premium">เข้าสู่ระบบ</button>
        <button onclick="toggleAuth(false)" class="text-blue-600 text-sm font-semibold hover:underline">ยังไม่มีบัญชี? สมัครสมาชิก</button>
    </div>

    <!-- Signup Section -->
    <div id="signup-section" class="glass-card flex flex-col gap-5 text-center hidden">
        <h1 class="text-2xl font-bold text-gray-800">สมัครสมาชิก</h1>
        <p class="text-gray-500 text-sm">กรอกข้อมูลเพื่อสร้างบัญชีใหม่</p>
        <div class="space-y-3">
            <div class="relative">
                <i class="fa-solid fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="reg-name" placeholder="ชื่อ-นามสกุล" class="input-premium">
            </div>
            <div class="relative">
                <i class="fa-solid fa-map-marker-alt absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <select id="reg-province" class="input-premium appearance-none">
                    <option value="">เลือกจังหวัด</option>
                    <option value="กรุงเทพมหานคร">กรุงเทพมหานคร</option>
                    <option value="นนทบุรี">นนทบุรี</option>
                    <option value="ปทุมธานี">ปทุมธานี</option>
                    <option value="สมุทรปราการ">สมุทรปราการ</option>
                    <option value="ชลบุรี">ชลบุรี</option>
                    <option value="เชียงใหม่">เชียงใหม่</option>
                    <option value="ขอนแก่น">ขอนแก่น</option>
                    <option value="นครราชสีมา">นครราชสีมา</option>
                </select>
            </div>
            <div class="relative">
                <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="reg-user" placeholder="ชื่อผู้ใช้งาน" class="input-premium">
            </div>
            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="password" id="reg-pass" placeholder="รหัสผ่าน" class="input-premium">
            </div>
        </div>
        <button onclick="handleSignup()" class="btn-premium bg-green-600 hover:bg-green-700">สมัครสมาชิก</button>
        <button onclick="toggleAuth(true)" class="text-gray-500 text-sm font-semibold hover:underline">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</button>
    </div>

    <script>
        function toggleAuth(isLogin) {
            document.getElementById('login-section').classList.toggle('hidden', !isLogin);
            document.getElementById('signup-section').classList.toggle('hidden', isLogin);
        }

        async function handleLogin() {
            const username = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            if (!username || !pass) return Swal.fire('ข้อมูลไม่ครบ', '', 'warning');

            showLoading(true, 'กำลังตรวจสอบข้อมูล...');
            try {
                const res = await AUTH.callGAS('login', { username, password: pass });
                showLoading(false);
                if (res.status === 'success') {
                    const userProfile = { ...res.user, isLoggedIn: true };
                    localStorage.setItem('survey_profile_v16', JSON.stringify(userProfile));
                    window.location.href = 'projects.html';
                } else {
                    Swal.fire('เข้าสู่ระบบไม่สำเร็จ', res.message, 'error');
                }
            } catch (err) {
                showLoading(false);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            }
        }

        async function handleSignup() {
            const name = document.getElementById('reg-name').value;
            const province = document.getElementById('reg-province').value;
            const username = document.getElementById('reg-user').value;
            const pass = document.getElementById('reg-pass').value;

            if (!name || !province || !username || !pass) return Swal.fire('ข้อมูลไม่ครบ', '', 'warning');

            showLoading(true, 'กำลังบันทึกข้อมูล...');
            try {
                const res = await AUTH.callGAS('register', { name, province, username, password: pass });
                showLoading(false);
                if (res.status === 'success') {
                    Swal.fire('สำเร็จ', 'ลงทะเบียนเรียบร้อยแล้ว กรุณาเข้าสู่ระบบ', 'success').then(() => toggleAuth(true));
                } else {
                    Swal.fire('ลงทะเบียนไม่สำเร็จ', res.message, 'error');
                }
            } catch (err) {
                showLoading(false);
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
            }
        }

        // Auto redirect if already logged in
        window.onload = () => {
            const user = localStorage.getItem('survey_profile_v16');
            if (user) {
                const parsed = JSON.parse(user);
                if (parsed.isLoggedIn) window.location.href = 'projects.html';
            }
        };
    </script>
</body>
</html>
