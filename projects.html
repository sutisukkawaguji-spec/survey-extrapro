<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการงาน - Survey Solo Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="config.js"></script>
    <script src="auth-check.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; min-height: 100vh; padding-bottom: 80px; }
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .project-card { border-radius: 20px; background: white; padding: 16px; border: 1px solid #eef2f6; transition: 0.3s; }
        .project-card:hover { border-color: #2563eb; }
        .btn-enter { background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; border-radius: 12px; padding: 10px; font-weight: bold; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        
        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; color: #94a3b8; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: #2563eb; }
        
        /* Custom Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; font-size: 12px; cursor: pointer; transition: 0.2s; position: relative; }
        .calendar-day:hover { background: #f0f7ff; }
        .calendar-day.active { background: #2563eb; color: white; }
        .calendar-day.has-data::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: #2563eb; border-radius: 50%; }
        .calendar-day.active.has-data::after { background: white; }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto p-4">
        <!-- Profile Header -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-bold text-xl shadow-lg" id="user-initial">U</div>
                <div>
                    <h1 class="text-sm font-bold text-gray-800" id="user-welcome">สวัสดี</h1>
                    <p class="text-[10px] text-gray-400" id="user-location">-</p>
                </div>
            </div>
            <button onclick="AUTH.logout()" class="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center shadow-sm"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <!-- Section: Home (Project List) -->
        <div id="section-projects">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-700">รายการงาน <span id="proj-total" class="text-blue-600">0</span></h3>
                <button onclick="openCreateDialog()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md">+ สร้างงาน</button>
            </div>
            <div id="project-list" class="space-y-4">
                <!-- Project Cards -->
            </div>
        </div>

        <!-- Section: Reports -->
        <div id="section-reports" class="hidden">
            <div class="glass-card p-5 bg-gradient-to-br from-blue-600 to-indigo-700 text-white mb-4">
                <h2 class="text-lg font-bold">รายงานสำรวจ</h2>
                <div class="grid grid-cols-3 gap-2 mt-4 text-center">
                    <div class="bg-white/10 p-2 rounded-xl">
                        <div class="text-xl font-bold" id="stat-total">0</div>
                        <div class="text-[8px] uppercase">ทั้งหมด</div>
                    </div>
                    <div class="bg-white/10 p-2 rounded-xl border-x border-white/10">
                        <div class="text-xl font-bold" id="stat-today">0</div>
                        <div class="text-[8px] uppercase">วันนี้</div>
                    </div>
                    <div class="bg-white/10 p-2 rounded-xl">
                        <div class="text-xl font-bold" id="stat-img">0</div>
                        <div class="text-[8px] uppercase">มีรูป</div>
                    </div>
                </div>
            </div>

            <!-- 1. Select Project -->
            <div class="glass-card p-4 mb-4">
                <label class="text-[10px] font-bold text-gray-400 uppercase">1. เลือกโครงการ</label>
                <select id="report-project-select" class="w-full bg-gray-50 border-0 rounded-xl p-3 text-xs mt-1 outline-none focus:ring-2 ring-blue-500" onchange="handleReportScopeChange()">
                    <option value="ALL">ทุกโครงการ</option>
                </select>

                <div class="mt-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">2. ขอบเขตข้อมูล</label>
                    <div class="flex gap-2 mt-1">
                        <button id="btn-scope-all" onclick="setReportScope('ALL')" class="flex-1 py-2 rounded-xl text-[10px] font-bold bg-blue-600 text-white">ทั้งหมด</button>
                        <button id="btn-scope-date" onclick="setReportScope('DATE')" class="flex-1 py-2 rounded-xl text-[10px] font-bold bg-gray-100 text-gray-400">ช่วงวันที่</button>
                    </div>
                </div>

                <!-- Date Range Selection (Hidden by Default) -->
                <div id="date-range-wrapper" class="mt-4 grid grid-cols-2 gap-2 hidden">
                    <div>
                        <label class="text-[8px] font-bold text-gray-400 uppercase">จากวันที่</label>
                        <input type="date" id="report-start-date" class="w-full bg-gray-50 border-0 rounded-lg p-2 text-[10px] outline-none" onchange="handleReportScopeChange()">
                    </div>
                    <div>
                        <label class="text-[8px] font-bold text-gray-400 uppercase">ถึงวันที่</label>
                        <input type="date" id="report-end-date" class="w-full bg-gray-50 border-0 rounded-lg p-2 text-[10px] outline-none" onchange="handleReportScopeChange()">
                    </div>
                </div>
            </div>

            <!-- 2. Custom Calendar (Hidden by Default) -->
            <div id="calendar-wrapper" class="glass-card p-4 mb-4 hidden">
...
                <div class="flex justify-between items-center mb-4">
                    <h4 class="font-bold text-gray-800 text-sm" id="cal-month">เมษายน 2024</h4>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center"><i class="fa-solid fa-chevron-left text-xs text-gray-400"></i></button>
                        <button onclick="changeMonth(1)" class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center"><i class="fa-solid fa-chevron-right text-xs text-gray-400"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center mb-2">
                    <div class="text-[10px] font-bold text-gray-400">อา</div><div class="text-[10px] font-bold text-gray-400">จ</div><div class="text-[10px] font-bold text-gray-400">อ</div><div class="text-[10px] font-bold text-gray-400">พ</div><div class="text-[10px] font-bold text-gray-400">พฤ</div><div class="text-[10px] font-bold text-gray-400">ศ</div><div class="text-[10px] font-bold text-gray-400">ส</div>
                </div>
                <div id="calendar-body" class="calendar-grid"></div>
            </div>
            
            <!-- 3. Results -->
            <div id="report-results" class="space-y-2 mb-4"></div>

            <!-- 4. Export (Bottom) -->
            <div class="flex gap-2 mt-6">
                <button onclick="exportExcel()" class="flex-1 bg-green-50 text-green-600 p-4 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 border border-green-100 shadow-sm">
                    <i class="fa-solid fa-file-excel"></i> Export Excel
                </button>
                <button onclick="exportPDF()" class="flex-1 bg-red-50 text-red-600 p-4 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 border border-red-100 shadow-sm">
                    <i class="fa-solid fa-file-pdf"></i> Export PDF
                </button>
            </div>
        </div>

        <!-- Section: Settings -->
        <div id="section-settings" class="hidden">
            <h3 class="font-bold text-gray-700 mb-4">การตั้งค่าระบบ</h3>
            
            <div class="glass-card p-5 mb-4">
                <div class="flex items-center gap-3 mb-4 border-b pb-4">
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 text-xl"><i class="fa-solid fa-user-shield"></i></div>
                    <div>
                        <div class="font-bold text-gray-800" id="set-user-name">คุณ...</div>
                        <div class="text-[10px] text-gray-400" id="set-user-province">จังหวัด...</div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                        <label class="text-[10px] font-bold text-blue-600 uppercase mb-2 block">คลังแผนที่ส่วนกลาง (Map Library)</label>
                        <div class="space-y-2 mb-3" id="map-library-list">
                            <!-- Map items will be here -->
                        </div>
                        <button onclick="openAddMapDialog()" class="w-full py-2 bg-white border border-blue-200 rounded-xl text-[10px] font-bold text-blue-600 shadow-sm active:scale-95 transition-transform">
                            <i class="fa-solid fa-plus-circle mr-1"></i> เพิ่มแผนที่เข้าคลัง
                        </button>
                    </div>
                    
                    <hr>
...

                    <div class="flex justify-between items-center">
                        <div>
                            <div class="font-bold text-sm text-gray-800">เสียงเอฟเฟกต์</div>
                            <div class="text-[10px] text-gray-400">เสียงเตือนเมื่อบันทึกสำเร็จ</div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="setting-sfx" class="sr-only peer" onchange="localStorage.setItem('survey_sfx_enabled', this.checked)">
                            <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-green-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                        </label>
                    </div>
                </div>
            </div>

            <button onclick="AUTH.logout()" class="w-full bg-red-50 text-red-500 p-4 rounded-2xl font-bold text-xs flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
            </button>
        </div>
    </div>

    <!-- Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchView('projects', this)">
            <i class="fa-solid fa-layer-group text-xl mb-1"></i>
            <span>งานสำรวจ</span>
        </div>
        <div class="nav-item" onclick="switchView('reports', this)">
            <i class="fa-solid fa-calendar-check text-xl mb-1"></i>
            <span>รายงาน</span>
        </div>
        <div class="nav-item" onclick="switchView('settings', this)">
            <i class="fa-solid fa-sliders text-xl mb-1"></i>
            <span>ตั้งค่า</span>
        </div>
    </div>

    <script>
        let user = null, allProjects = [], allRecords = [], availableStaff = [], mapLibrary = [];
        let calDate = new Date();
        let selectedReportDate = null;
        let currentReportScope = 'ALL'; // 'ALL' or 'DATE'

        window.onload = () => {
            user = AUTH.check();
            if (!user) return;
            setupProfile();
            loadFromCache();
            loadDataBackground();
        };

        function setupProfile() {
            document.getElementById('user-welcome').innerText = 'สวัสดี, ' + user.name;
            document.getElementById('user-location').innerText = 'พนักงานจังหวัด: ' + user.province;
            document.getElementById('user-initial').innerText = user.name[0];
            
            // หน้าตั้งค่า
            document.getElementById('set-user-name').innerText = user.name;
            document.getElementById('set-user-province').innerText = 'เจ้าหน้าที่จังหวัด' + user.province;

            const sfxEnabled = localStorage.getItem('survey_sfx_enabled') !== 'false';
            document.getElementById('setting-sfx').checked = sfxEnabled;
        }

        function renderCalendar() {
            const calBody = document.getElementById('calendar-body');
            const calMonth = document.getElementById('cal-month');
            calBody.innerHTML = '';
            
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            calMonth.innerText = months[calDate.getMonth()] + " " + calDate.getFullYear();

            const firstDay = new Date(calDate.getFullYear(), calDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(calDate.getFullYear(), calDate.getMonth() + 1, 0).getDate();

            // Padding days
            for (let i = 0; i < firstDay; i++) { 
                const empty = document.createElement('div');
                calBody.appendChild(empty); 
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${calDate.getFullYear()}-${("0" + (calDate.getMonth() + 1)).slice(-2)}-${("0" + d).slice(-2)}`;
                const hasData = allRecords.some(r => r.date === dateStr);
                const active = selectedReportDate === dateStr ? 'active' : '';
                
                const dayEl = document.createElement('div');
                dayEl.className = `calendar-day ${active} ${hasData ? 'has-data' : ''} h-10 w-full flex items-center justify-center text-xs font-bold transition-all`;
                dayEl.innerText = d;
                dayEl.onclick = () => selectDate(dateStr);
                calBody.appendChild(dayEl);
            }
        }

        function updateMapPreview(url, targetId = 'map-preview-name') {
            const el = document.getElementById(targetId);
            if (!el) return;
            if (!url) { el.innerHTML = ''; return; }
            
            let statusText = 'กำลังตรวจสอบลิงก์...';
            let colorClass = 'text-yellow-500';

            if (url.includes('drive.google.com')) {
                statusText = '<i class="fa-solid fa-cloud-check"></i> แผนที่ Google Drive (พร้อมใช้งานเบื้องหลัง)';
                colorClass = 'text-blue-500';
            } else if (url.startsWith('http')) {
                statusText = '<i class="fa-solid fa-link"></i> แผนที่จาก URL ภายนอก (พร้อมใช้งาน)';
                colorClass = 'text-green-500';
            } else {
                statusText = '<i class="fa-solid fa-circle-xmark"></i> รูปแบบลิงก์ไม่ถูกต้อง';
                colorClass = 'text-red-500';
            }

            el.innerHTML = `<div class="${colorClass} text-[9px] font-bold mt-1 animate-pulse">${statusText}</div>`;
            setTimeout(() => el.querySelector('div').classList.remove('animate-pulse'), 2000);
        }

        function loadFromCache() {
            const cp = localStorage.getItem('survey_projects_cache');
            if (cp) { allProjects = JSON.parse(cp); renderProjects(); }
        }

        async function loadDataBackground() {
            try {
                const [projRes, staffRes, recRes, mapRes] = await Promise.all([
                    AUTH.callGAS('getProjects', { username: user.username }),
                    AUTH.callGAS('getStaff', { province: user.province, excludeUser: user.username }),
                    AUTH.callGAS('getSurveyRecords', { project_id: 'ALL' }),
                    AUTH.callGAS('getMapLibrary')
                ]);
                if (projRes.status === 'success') {
                    allProjects = projRes.projects;
                    localStorage.setItem('survey_projects_cache', JSON.stringify(allProjects));
                    renderProjects();
                    updateProjectSelect();
                }
                if (staffRes.status === 'success') availableStaff = staffRes.staff;
                if (recRes.status === 'success') {
                    allRecords = recRes.records;
                    updateStats();
                }
                if (mapRes.status === 'success') {
                    mapLibrary = mapRes.maps;
                    renderMapLibrary();
                }
            } catch (e) { console.error("BG Load failed", e); }
        }

        function renderMapLibrary() {
            const list = document.getElementById('map-library-list');
            if (!list) return;
            list.innerHTML = '';
            if (mapLibrary.length === 0) {
                list.innerHTML = '<p class="text-[9px] text-gray-400 text-center py-2 italic">ยังไม่มีแผนที่ในคลัง</p>';
                return;
            }
            mapLibrary.forEach(m => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-2 rounded-xl border border-gray-100 shadow-sm">
                        <div class="flex-1 min-w-0 pr-2">
                            <div class="text-[10px] font-bold text-gray-800 truncate">${m.name}</div>
                            <div class="text-[8px] text-blue-500 truncate">${m.url}</div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="testAnyMap('${m.url}')" class="w-6 h-6 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center text-[8px]"><i class="fa-solid fa-vial"></i></button>
                            <button onclick="deleteMapFromLib('${m.name}')" class="w-6 h-6 rounded-lg bg-red-50 text-red-500 flex items-center justify-center text-[8px]"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        async function testAnyMap(url) {
            showLoading(true, 'กำลังทดสอบแผนที่...');
            try {
                const gasRes = await AUTH.callGAS('fetchExternalMap', { url: url });
                showLoading(false);
                if (gasRes.status === 'success') {
                    Swal.fire('สำเร็จ', `พบข้อมูล ${gasRes.data.features.length} แปลงในแผนที่นี้`, 'success');
                } else { Swal.fire('Error', 'ไม่สามารถดึงข้อมูลได้', 'error'); }
            } catch (e) { showLoading(false); Swal.fire('Error', 'การเชื่อมต่อล้มเหลว', 'error'); }
        }

        function openAddMapDialog() {
            Swal.fire({
                title: 'เพิ่มแผนที่เข้าคลัง',
                html: `
                    <input id="sw-lib-name" class="swal2-input text-sm" placeholder="ชื่อแผนที่ (เช่น แผนที่ดิน ม.1)">
                    <input id="sw-lib-url" class="swal2-input text-sm" placeholder="ลิงก์ GeoJSON (Google Drive)">
                `,
                confirmButtonText: 'บันทึกเข้าคลัง',
                showCancelButton: true,
                preConfirm: () => {
                    const name = document.getElementById('sw-lib-name').value;
                    const url = document.getElementById('sw-lib-url').value;
                    if (!name || !url) return Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบ');
                    return { name, url };
                }
            }).then(async res => {
                if (res.isConfirmed) {
                    showLoading(true);
                    await AUTH.callGAS('saveMapToLibrary', res.value);
                    loadDataBackground();
                }
            });
        }

        async function deleteMapFromLib(name) {
            const res = await Swal.fire({ title: 'ยืนยัน?', text: `ลบแผนที่ "${name}" ออกจากคลัง?`, icon: 'warning', showCancelButton: true });
            if (res.isConfirmed) {
                showLoading(true);
                await AUTH.callGAS('deleteMapFromLibrary', { name: name });
                loadDataBackground();
            }
        }

        function renderProjects() {
            const list = document.getElementById('project-list');
            list.innerHTML = '';
            document.getElementById('proj-total').innerText = allProjects.length;
            allProjects.forEach(p => {
                const total = p.data ? p.data.length : 0;
                const done = allRecords.filter(r => r.project_id === p.id).length;
                const shareCount = p.sharedWith ? p.sharedWith.length : 0;
                const isOwner = p.owner.toString().trim().toLowerCase() === user.username.trim().toLowerCase();
                
                list.innerHTML += `
                    <div class="project-card shadow-sm bg-white p-5 rounded-2xl relative border border-gray-100">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1">
                                <h4 class="font-bold text-gray-800 text-base leading-tight">${p.projectName}</h4>
                                <div class="flex flex-wrap gap-2 mt-2">
                                    <span class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2.5 py-1 rounded-lg"><i class="fa-solid fa-map mr-1"></i> ${total} แปลง</span>
                                    <span class="text-[10px] font-bold bg-green-50 text-green-600 px-2.5 py-1 rounded-lg"><i class="fa-solid fa-check-circle mr-1"></i> ${done}/${total}</span>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mb-5 bg-gray-50 p-3 rounded-xl border border-dashed border-gray-200" onclick="showShared('${p.id}')">
                            <div class="flex items-center gap-2">
                                <div class="flex -space-x-2">
                                    <div class="w-8 h-8 rounded-full bg-blue-600 border-2 border-white flex items-center justify-center text-white text-[10px] font-bold"><i class="fa-solid fa-user"></i></div>
                                    <div class="w-8 h-8 rounded-full bg-gray-200 border-2 border-white flex items-center justify-center text-gray-500 text-[10px] font-bold">+${shareCount}</div>
                                </div>
                                <span class="text-[10px] font-bold text-gray-500 ml-1">ทีมสำรวจ</span>
                            </div>
                            <div class="text-[10px] font-bold text-gray-400">ID: ${p.id.split('_')[1] || p.id.split('_')[0]}</div>
                        </div>

                        <!-- Buttons side by side -->
                        <div class="flex gap-2">
                            <button onclick="openMap('${p.id}')" class="flex-[2] btn-enter py-3 text-sm">
                                <i class="fa-solid fa-play mr-2"></i> เริ่มงานสำรวจ
                            </button>
                            ${isOwner ? `
                                <button onclick="openEditDialog('${p.id}')" class="flex-1 bg-gray-50 text-gray-600 rounded-2xl font-bold text-xs border border-gray-200 active:scale-95 transition-transform flex items-center justify-center gap-1">
                                    <i class="fa-solid fa-pen-to-square"></i> แก้ไข
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
        }

        function updateProjectSelect() {
            const sel = document.getElementById('report-project-select');
            const val = sel.value;
            sel.innerHTML = '<option value="ALL">ทุกโครงการ</option>';
            allProjects.forEach(p => sel.innerHTML += `<option value="${p.id}">${p.projectName}</option>`);
            sel.value = val;
        }

        function switchView(view, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('section-projects').classList.toggle('hidden', view !== 'projects');
            document.getElementById('section-reports').classList.toggle('hidden', view !== 'reports');
            document.getElementById('section-settings').classList.toggle('hidden', view !== 'settings');
            if (view === 'reports') {
                updateStats();
                handleReportScopeChange();
            }
        }

        function handleReportScopeChange() {
            const projId = document.getElementById('report-project-select').value;
            const start = document.getElementById('report-start-date').value;
            const end = document.getElementById('report-end-date').value;

            if (currentReportScope === 'ALL') {
                renderReportResults(projId, null);
            } else {
                if (start && end) {
                    renderReportResults(projId, { start, end });
                } else {
                    renderCalendar();
                }
            }
        }

        function setReportScope(scope) {
            currentReportScope = scope;
            document.getElementById('btn-scope-all').className = `flex-1 py-2 rounded-xl text-[10px] font-bold ${scope === 'ALL' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-400'}`;
            document.getElementById('btn-scope-date').className = `flex-1 py-2 rounded-xl text-[10px] font-bold ${scope === 'DATE' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-400'}`;
            
            document.getElementById('date-range-wrapper').classList.toggle('hidden', scope !== 'DATE');
            document.getElementById('calendar-wrapper').classList.toggle('hidden', scope !== 'DATE');
            handleReportScopeChange();
        }

        function renderReportResults(projId, dateRange) {
            const res = document.getElementById('report-results');
            let filtered = allRecords;
            if (projId !== 'ALL') filtered = filtered.filter(r => r.project_id === projId);
            
            if (dateRange && dateRange.start && dateRange.end) {
                filtered = filtered.filter(r => r.date >= dateRange.start && r.date <= dateRange.end);
                res.innerHTML = `<h5 class="text-[10px] font-bold text-gray-500 mb-2 uppercase">ข้อมูลระหว่าง: ${dateRange.start} ถึง ${dateRange.end} (${filtered.length} รายการ)</h5>`;
            } else if (typeof dateRange === 'string') {
                filtered = filtered.filter(r => r.date === dateRange);
                res.innerHTML = `<h5 class="text-[10px] font-bold text-gray-500 mb-2 uppercase">ข้อมูลวันที่: ${dateRange} (${filtered.length} รายการ)</h5>`;
            } else {
                res.innerHTML = `<h5 class="text-[10px] font-bold text-gray-500 mb-2 uppercase">ข้อมูลทั้งหมด (${filtered.length} รายการ)</h5>`;
            }
            
            if (filtered.length === 0) {
                res.innerHTML += `<p class="text-center py-6 text-gray-400 text-[10px]">ไม่พบข้อมูลการสำรวจในช่วงเวลานี้</p>`;
                return;
            }

            filtered.forEach(r => {
                const p = allProjects.find(px => px.id === r.project_id);
                res.innerHTML += `
                    <div class="glass-card p-3 flex gap-3 items-center bg-white rounded-2xl shadow-sm mb-2">
                        ${r.photo_url ? `<img src="${r.photo_url}" class="w-12 h-12 rounded-lg object-cover">` : `<div class="w-12 h-12 rounded-lg bg-gray-100 flex items-center justify-center text-gray-300 text-[8px]">No Pic</div>`}
                        <div class="flex-1">
                            <div class="text-[10px] font-bold text-gray-800">${p ? p.projectName : 'N/A'}</div>
                            <div class="text-[8px] text-gray-400">แปลง: ${r.feature_id} | ผู้สำรวจ: ${r.surveyor}</div>
                            <div class="text-[8px] text-blue-500 mt-1">${r.date}</div>
                        </div>
                    </div>
                `;
            });
        }

        function changeMonth(dir) {
            calDate.setMonth(calDate.getMonth() + dir);
            renderCalendar();
        }

        function selectDate(date) {
            selectedReportDate = date;
            renderCalendar();
            renderReportForDate(date);
        }

        function renderReportForDate(date) {
            const res = document.getElementById('report-results');
            const filtered = allRecords.filter(r => r.date === date);
            res.innerHTML = `<h5 class="text-xs font-bold text-gray-500 mb-2">ข้อมูลวันที่: ${date} (${filtered.length} รายการ)</h5>`;
            filtered.forEach(r => {
                const p = allProjects.find(px => px.id === r.project_id);
                res.innerHTML += `
                    <div class="glass-card p-3 flex gap-3 items-center">
                        ${r.photo_url ? `<img src="${r.photo_url}" class="w-12 h-12 rounded-lg object-cover">` : `<div class="w-12 h-12 rounded-lg bg-gray-100 flex items-center justify-center text-gray-300 text-xs">No Pic</div>`}
                        <div>
                            <div class="text-[10px] font-bold text-gray-800">${p ? p.projectName : 'N/A'}</div>
                            <div class="text-[9px] text-gray-400">ID: ${r.feature_id} | ผู้สำรวจ: ${r.surveyor}</div>
                        </div>
                    </div>
                `;
            });
        }

        async function testGlobalMap() {
            const url = document.getElementById('setting-global-map').value;
            if (!url) return Swal.fire('คำเตือน', 'กรุณาใส่ลิงก์แผนที่ก่อนทดสอบ', 'warning');
            
            showLoading(true, 'กำลังดึงรายการแผนที่ (ผ่าน Proxy)...');
            
            try {
                const gasRes = await AUTH.callGAS('fetchExternalMap', { url: url });
                showLoading(false);
                
                if (gasRes.status === 'success') {
                    const features = gasRes.data.features || [];
                    let listHtml = `<div class="text-left max-h-60 overflow-y-auto space-y-1 mt-2 border rounded p-1">`;
                    features.slice(0, 100).forEach((f, i) => {
                        const pid = f.properties.id || f.properties.ID || i+1;
                        listHtml += `<div class="text-[9px] p-1 border-b flex justify-between"><span>#${i+1}</span> <b>ID: ${pid}</b></div>`;
                    });
                    listHtml += `</div>`;
                    
                    Swal.fire({
                        title: 'ตรวจสอบรายการแผนที่',
                        html: `<p class="text-xs">พบข้อมูลทั้งหมด <b>${features.length}</b> แปลง</p>${listHtml}`,
                        icon: 'success',
                        confirmButtonText: 'ลองเปิดแผนที่จริง',
                        showCancelButton: true
                    }).then(res => {
                        if (res.isConfirmed) {
                            const p = { id: 'TEST_MODE', projectName: 'ทดสอบแผนที่กลาง', mapUrl: url, sharedWith: [], data: [] };
                            localStorage.setItem('survey_current_project_info', JSON.stringify(p));
                            window.location.href = 'map.html';
                        }
                    });
                } else {
                    Swal.fire('Error', 'ไม่สามารถเข้าถึงไฟล์ได้: ' + gasRes.message, 'error');
                }
            } catch (e) {
                showLoading(false);
                Swal.fire('Error', 'เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
            }
        }

        function openEditDialog(id) {
            const p = allProjects.find(px => px.id === id);
            renderProjectDialog('แก้ไขงานสำรวจ', 'บันทึกการแก้ไข', p);
        }

        function openCreateDialog() {
            renderProjectDialog('สร้างงานสำรวจ', 'สร้างงาน');
        }

        function saveGlobalMap() {
            const url = document.getElementById('setting-global-map').value;
            localStorage.setItem('survey_global_map_url', url);
            updateMapPreview(url, 'setting-map-preview');
            Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'บันทึกสำเร็จ', timer: 1500, showConfirmButton: false });
        }

        function renderProjectDialog(title, btnText, project = null) {
            let staffHtml = '';
            availableStaff.forEach(s => {
                const isShared = project && project.sharedWith.includes(s.username);
                staffHtml += `
                    <label class="flex justify-between items-center p-3 hover:bg-gray-50 rounded-xl cursor-pointer">
                        <span class="text-xs font-bold text-gray-700">${s.name}</span>
                        <input type="checkbox" name="staff-check" value="${s.username}" ${isShared ? 'checked' : ''} class="w-5 h-5 accent-blue-600">
                    </label>`;
            });

            let mapOptions = '<option value="">-- เลือกแผนที่จากคลัง --</option>';
            mapLibrary.forEach(m => {
                const selected = project && project.mapUrl === m.url ? 'selected' : '';
                mapOptions += `<option value="${m.url}" ${selected}>${m.name}</option>`;
            });

            Swal.fire({
                title: title,
                html: `
                    <div class="text-left space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">ชื่อโครงการสำรวจ</label>
                            <input id="sw-name" class="w-full bg-gray-100 border-0 rounded-xl p-3 text-sm mt-1 outline-none focus:ring-2 ring-blue-500" value="${project ? project.projectName : ''}">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">เลือกแผนที่สำรวจ</label>
                            <select id="sw-map-select" class="w-full bg-gray-100 border-0 rounded-xl p-3 text-sm mt-1 outline-none">
                                ${mapOptions}
                            </select>
                            <div class="text-[8px] text-gray-400 mt-1">* หากยังไม่มีแผนที่ ให้ไปเพิ่มที่หน้า "ตั้งค่า" ก่อน</div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase block">แชร์งานร่วมกัน (${user.province})</label>
                            <div class="mt-2 border rounded-xl overflow-hidden max-h-40 overflow-y-auto">${staffHtml || '<p class="p-3 text-xs text-center text-gray-400">ไม่พบเพื่อนร่วมงาน</p>'}</div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: btnText,
                preConfirm: () => {
                    const name = document.getElementById('sw-name').value;
                    const mapUrl = document.getElementById('sw-map-select').value;
                    const shared = Array.from(document.querySelectorAll('input[name="staff-check"]:checked')).map(el => el.value);
                    if (!name) return Swal.showValidationMessage('กรุณากรอกชื่อโครงการ');
                    if (!mapUrl) return Swal.showValidationMessage('กรุณาเลือกแผนที่');
                    return { name, mapUrl, shared };
                }
            }).then(async (res) => {
                if (res.isConfirmed) {
                    showLoading(true);
                    try {
                        const payload = { 
                            id: project ? project.id : null,
                            username: user.username, 
                            projectName: res.value.name, 
                            province: user.province, 
                            sharedWith: res.value.shared, 
                            mapUrl: res.value.mapUrl, 
                            data: project ? project.data : [] 
                        };
                        const gasRes = await AUTH.callGAS('saveProject', payload);
                        if (gasRes.status === 'success') { 
                            Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success'); 
                            loadDataBackground(); 
                        }
                    } catch (e) { 
                        Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error'); 
                    } finally { 
                        showLoading(false); 
                    }
                }
            });
        }

        function updateMapPreview(url, targetId = 'map-preview-name') {
            const el = document.getElementById(targetId);
            if (!el) return;
            if (!url) { el.innerHTML = ''; return; }
            
            let statusText = 'ตรวจสอบลิงก์แล้ว';
            if (url.includes('drive.google.com')) statusText = 'ลิงก์ Google Drive (พร้อมใช้งาน)';
            el.innerHTML = `<div class="text-blue-500 text-[9px] font-bold mt-1">${statusText}</div>`;
        }

        function openMap(id) {
            const p = allProjects.find(px => px.id === id);
            localStorage.setItem('survey_current_project_info', JSON.stringify(p));
            window.location.href = 'map.html';
        }
    </script>
</body>
</html>
