<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการงาน - Survey Solo Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="config.js"></script>
    <script src="auth-check.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; min-height: 100vh; padding-bottom: 80px; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        .project-card { transition: 0.3s; position: relative; overflow: hidden; }
        .project-card:hover { transform: translateY(-3px); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; height: 75px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; color: #94a3b8; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: #2563eb; }
        .stat-badge { background: #f1f5f9; padding: 4px 8px; border-radius: 8px; font-size: 10px; color: #475569; font-weight: bold; }
        .btn-survey { background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; border-radius: 12px; padding: 8px 16px; font-size: 12px; font-weight: bold; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        
        /* Calendar UI */
        .calendar-dot { width: 4px; height: 4px; background: #2563eb; border-radius: 50%; margin: 0 auto; margin-top: 2px; }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="main-view" class="p-4 max-w-md mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold" id="user-initial">U</div>
                <div>
                    <h1 class="text-sm font-bold text-gray-800" id="user-welcome">สวัสดี</h1>
                    <p class="text-[10px] text-gray-400" id="user-location">-</p>
                </div>
            </div>
            <button onclick="AUTH.logout()" class="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <!-- Section: Projects -->
        <div id="section-projects">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-gray-700">โครงการสำรวจ <span id="proj-total" class="text-blue-600 text-sm">0</span></h3>
                <button onclick="openCreateDialog()" class="text-blue-600 text-xs font-bold bg-blue-50 px-3 py-1.5 rounded-lg">+ เพิ่มงาน</button>
            </div>
            <div id="project-list" class="space-y-4">
                <!-- Projects Render Here -->
                <div class="flex flex-col items-center py-10 text-gray-300">
                    <div class="animate-pulse flex flex-col items-center">
                        <div class="w-12 h-12 bg-gray-200 rounded-full mb-2"></div>
                        <div class="h-2 w-24 bg-gray-200 rounded"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section: Reports -->
        <div id="section-reports" class="hidden">
            <div class="glass-card p-5 mb-4 bg-gradient-to-br from-indigo-600 to-blue-700 text-white border-0">
                <h2 class="text-lg font-bold">รายงานสำรวจ</h2>
                <div class="flex justify-between mt-3 text-[10px] opacity-90">
                    <div class="text-center">
                        <div class="text-xl font-bold" id="rep-count-total">0</div>
                        <div>ทั้งหมด</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xl font-bold" id="rep-count-today">0</div>
                        <div>วันนี้</div>
                    </div>
                    <div class="text-center">
                        <div class="text-xl font-bold" id="rep-count-img">0</div>
                        <div>มีรูปถ่าย</div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm mb-4">
                <label class="text-[10px] font-bold text-gray-400 uppercase">เลือกโครงการ & วันที่</label>
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <select id="report-project-select" class="bg-gray-50 border-0 rounded-xl p-2 text-xs outline-none focus:ring-2 ring-blue-500" onchange="updateReportStats()">
                        <option value="">ทุกโครงการ</option>
                    </select>
                    <input type="date" id="report-date" class="bg-gray-50 border-0 rounded-xl p-2 text-xs outline-none" onchange="updateReportStats()">
                </div>
            </div>

            <div class="flex gap-2 mb-4">
                <button onclick="exportExcel()" class="flex-1 bg-green-50 text-green-600 p-3 rounded-xl font-bold text-xs flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-excel"></i> Excel
                </button>
                <button onclick="exportPDF()" class="flex-1 bg-red-50 text-red-600 p-3 rounded-xl font-bold text-xs flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-pdf"></i> PDF
                </button>
            </div>

            <div id="report-preview" class="space-y-2"></div>
        </div>

        <!-- Section: Settings -->
        <div id="section-settings" class="hidden">
            <h3 class="font-bold text-gray-700 mb-4">ตั้งค่าระบบ</h3>
            <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">ลิงก์แผนที่กลาง (Global GeoJSON)</label>
                    <input id="setting-global-map" class="w-full bg-gray-50 border-0 rounded-xl p-3 text-xs mt-1 outline-none focus:ring-2 ring-blue-500" placeholder="https://drive.google.com/..." onchange="saveGlobalMap()">
                </div>
                <hr>
                <!-- Sound & Music Settings -->
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="font-bold text-sm text-gray-800">เพลงบรรยากาศ</div>
                            <div class="text-[10px] text-gray-400">เปิดเพลงคลอเบาๆ ขณะทำงาน</div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="setting-music" class="sr-only peer" onchange="toggleMusic(this.checked)">
                            <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                        </label>
                    </div>
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="font-bold text-sm text-gray-800">เสียงเอฟเฟกต์</div>
                            <div class="text-[10px] text-gray-400">เสียงยืนยันเมื่อบันทึกสำเร็จ</div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="setting-sfx" checked class="sr-only peer" onchange="localStorage.setItem('survey_sfx_enabled', this.checked)">
                            <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-green-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
                        </label>
                    </div>
                </div>
                <hr>
                <div class="flex justify-between items-center">
...
        </div>
    </div>

    <!-- Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchView('projects', this)">
            <i class="fa-solid fa-home text-xl mb-1"></i>
            <span>หน้าแรก</span>
        </div>
        <div class="nav-item" onclick="switchView('reports', this)">
            <i class="fa-solid fa-chart-pie text-xl mb-1"></i>
            <span>รายงาน</span>
        </div>
        <div class="nav-item" onclick="switchView('settings', this)">
            <i class="fa-solid fa-user-gear text-xl mb-1"></i>
            <span>ตั้งค่า</span>
        </div>
    </div>

    <script>
        let user = null;
        let allProjects = [];
        let allRecords = [];
        let availableStaff = [];

        let ambientAudio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        ambientAudio.loop = true;
        ambientAudio.volume = 0.2;

        window.onload = () => {
            user = AUTH.check();
            if (!user) return;
            setupProfile();
            
            // โหลดสถานะเสียง
            const musicEnabled = localStorage.getItem('survey_music_enabled') === 'true';
            document.getElementById('setting-music').checked = musicEnabled;
            if (musicEnabled) toggleMusic(true);
            
            const sfxEnabled = localStorage.getItem('survey_sfx_enabled') !== 'false';
            document.getElementById('setting-sfx').checked = sfxEnabled;
            
            // โหลดข้อมูลจาก Cache ทันที (Background Loading)
...
        }

        function toggleMusic(enabled) {
            localStorage.setItem('survey_music_enabled', enabled);
            if (enabled) {
                ambientAudio.play().catch(e => console.log("Audio play deferred"));
            } else {
                ambientAudio.pause();
            }
        }

        function setupProfile() {
            document.getElementById('user-welcome').innerText = 'สวัสดี, ' + user.name;
            document.getElementById('user-location').innerText = 'เจ้าหน้าที่จังหวัด' + user.province;
            document.getElementById('user-initial').innerText = user.name[0];
            const globalLink = localStorage.getItem('survey_global_map_url');
            if (globalLink) document.getElementById('setting-global-map').value = globalLink;
        }

        async function loadDataBackground() {
            try {
                // เรียกข้อมูลโปรเจกต์และสมาชิก
                const [projRes, staffRes, recRes] = await Promise.all([
                    AUTH.callGAS('getProjects', { username: user.username }),
                    AUTH.callGAS('getStaff', { province: user.province, excludeUser: user.username }),
                    AUTH.callGAS('getSurveyRecords', { project_id: 'ALL' }) // ดึงสรุปยอด
                ]);
                
                if (projRes.status === 'success') {
                    allProjects = projRes.projects;
                    localStorage.setItem('survey_projects_cache', JSON.stringify(allProjects));
                    renderProjects();
                    updateProjectSelect();
                }
                
                if (staffRes.status === 'success') availableStaff = staffRes.staff;
                if (recRes.status === 'success') {
                    allRecords = recRes.records;
                    updateReportStats();
                }
            } catch (err) {
                console.error("Background load failed", err);
            }
        }

        function renderProjects() {
            const list = document.getElementById('project-list');
            list.innerHTML = '';
            document.getElementById('proj-total').innerText = allProjects.length;

            if (allProjects.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-gray-400 text-xs">ยังไม่มีรายการงานสำรวจ</div>`;
                return;
            }

            allProjects.forEach(p => {
                const totalFeatures = p.data ? p.data.length : 0;
                // ในอนาคตจะดึงยอดจริงจาก allRecords
                const doneCount = allRecords.filter(r => r.project_id === p.id).length;
                
                list.innerHTML += `
                    <div class="project-card bg-white p-4 rounded-2xl shadow-sm border border-white">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm">${p.projectName}</h4>
                                <div class="flex gap-2 mt-1">
                                    <span class="stat-badge"><i class="fa-solid fa-map-location-dot"></i> ${totalFeatures} แปลง</span>
                                    <span class="stat-badge text-green-600"><i class="fa-solid fa-check-circle"></i> ${doneCount} เสร็จ</span>
                                </div>
                            </div>
                            <div class="flex items-center -space-x-2" onclick="showSharedUsers('${p.id}')">
                                <div class="w-6 h-6 rounded-full bg-blue-100 border-2 border-white flex items-center justify-center text-[8px] font-bold text-blue-600 cursor-pointer">
                                    <i class="fa-solid fa-users"></i>
                                </div>
                                <div class="w-6 h-6 rounded-full bg-gray-100 border-2 border-white flex items-center justify-center text-[8px] font-bold text-gray-400">
                                    +${p.sharedWith ? p.sharedWith.length : 0}
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <button onclick="openProject('${p.id}', '${p.projectName}')" class="btn-survey flex-1">
                                <i class="fa-solid fa-play mr-1"></i> เริ่มสำรวจ
                            </button>
                            <button onclick="openEditDialog('${p.id}')" class="w-10 h-10 bg-gray-50 text-gray-400 rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-ellipsis-v"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function showSharedUsers(projectId) {
            const p = allProjects.find(p => p.id === projectId);
            if (!p) return;
            const names = p.sharedWith && p.sharedWith.length > 0 ? p.sharedWith.join(', ') : 'ไม่มีคนแชร์ร่วม';
            Swal.fire({
                title: 'ผู้ร่วมสำรวจ',
                text: names,
                icon: 'info',
                confirmButtonText: 'รับทราบ'
            });
        }

        function switchView(view, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('section-projects').classList.toggle('hidden', view !== 'projects');
            document.getElementById('section-reports').classList.toggle('hidden', view !== 'reports');
            document.getElementById('section-settings').classList.toggle('hidden', view !== 'settings');
        }

        function updateReportStats() {
            const projId = document.getElementById('report-project-select').value;
            const dateVal = document.getElementById('report-date').value;
            
            let filtered = allRecords;
            if (projId) filtered = filtered.filter(r => r.project_id === projId);
            if (dateVal) {
                filtered = filtered.filter(r => {
                    const d = new Date(r.timestamp);
                    return d.toISOString().split('T')[0] === dateVal;
                });
            }

            document.getElementById('rep-count-total').innerText = filtered.length;
            document.getElementById('rep-count-img').innerText = filtered.filter(r => r.photo_url).length;
            
            // นับของวันนี้จริง
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('rep-count-today').innerText = allRecords.filter(r => new Date(r.timestamp).toISOString().split('T')[0] === today).length;
        }

        function updateProjectSelect() {
            const sel = document.getElementById('report-project-select');
            sel.innerHTML = '<option value="">ทุกโครงการ</option>';
            allProjects.forEach(p => sel.innerHTML += `<option value="${p.id}">${p.projectName}</option>`);
        }

        function saveGlobalMap() {
            const url = document.getElementById('setting-global-map').value;
            localStorage.setItem('survey_global_map_url', url);
            Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'บันทึกแผนที่กลางแล้ว', showConfirmButton: false, timer: 1500 });
        }

        function openCreateDialog() {
            // Logic เหมือนเดิมแต่เปลี่ยน UI
            renderProjectDialog('สร้างงานสำรวจ', 'สร้าง');
        }

        function renderProjectDialog(title, btnText, project = null) {
            let staffHtml = '';
            availableStaff.forEach(s => {
                const checked = project && project.sharedWith.includes(s.username) ? 'checked' : '';
                staffHtml += `
                    <label class="flex justify-between items-center p-3 hover:bg-gray-50 rounded-xl cursor-pointer">
                        <span class="text-xs font-bold text-gray-700">${s.name}</span>
                        <input type="checkbox" name="staff-check" value="${s.username}" ${checked} class="w-5 h-5 accent-blue-600">
                    </label>
                `;
            });

            Swal.fire({
                title: title,
                html: `
                    <div class="text-left space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">ชื่อโครงการ</label>
                            <input id="sw-name" class="w-full bg-gray-50 border-0 rounded-xl p-3 text-sm mt-1 outline-none focus:ring-2 ring-blue-500" value="${project ? project.projectName : ''}">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">แชร์งานให้เจ้าหน้าที่ (${user.province})</label>
                            <div class="mt-1 max-h-40 overflow-y-auto border rounded-xl divide-y">
                                ${staffHtml || '<p class="p-4 text-center text-[10px] text-gray-400">ไม่พบเจ้าหน้าที่ในจังหวัด</p>'}
                            </div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: btnText,
                preConfirm: () => {
                    const name = document.getElementById('sw-name').value;
                    const shared = Array.from(document.querySelectorAll('input[name="staff-check"]:checked')).map(el => el.value);
                    if (!name) return Swal.showValidationMessage('กรุณาระบุชื่อโครงการ');
                    return { name, shared };
                }
            }).then(async (res) => {
                if (res.isConfirmed) {
                    showLoading(true);
                    try {
                        const payload = {
                            username: user.username,
                            projectName: res.value.name,
                            province: user.province,
                            sharedWith: res.value.shared,
                            mapUrl: project ? project.mapUrl : '',
                            data: project ? project.data : []
                        };
                        const gasRes = await AUTH.callGAS('saveProject', payload);
                        if (gasRes.status === 'success') {
                            Swal.fire('สำเร็จ', 'บันทึกข้อมูลแล้ว', 'success');
                            loadDataBackground();
                        }
                    } catch (e) { Swal.fire('Error', 'บันทึกไม่สำเร็จ', 'error'); }
                    finally { showLoading(false); }
                }
            });
        }

        function openProject(id, name) {
            const project = allProjects.find(p => p.id === id);
            localStorage.setItem('survey_current_project_info', JSON.stringify(project));
            window.location.href = 'map.html';
        }
        
        function openEditDialog(id) {
            const p = allProjects.find(px => px.id === id);
            renderProjectDialog('แก้ไขงาน', 'บันทึก', p);
        }

        function exportExcel() { Swal.fire('Excel', 'กำลังส่งออกข้อมูล...', 'success'); }
        function exportPDF() { Swal.fire('PDF', 'กำลังสร้างรายงาน PDF...', 'success'); }
    </script>
</body>
</html>
